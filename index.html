<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feliz Cumple Mejor Amiga</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: radial-gradient(circle at center, #1a0f00 0%, #000 70%);
    color: #FFA216;
  }
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    transition: opacity 1.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  #catImg {
    max-width: min(280px, 60vw);
    max-height: 32vh;
    border-radius: 22px;
    margin-bottom: 28px;
    box-shadow: 0 10px 50px rgba(255, 162, 22, 0.4),
                0 0 0 3px rgba(255, 162, 22, 0.2);
    object-fit: cover;
    display: block;
    animation: gentleBob 4s ease-in-out infinite;
  }
  @keyframes gentleBob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-6px) rotate(1deg); }
  }
  #screen1 h1 {
    font-size: clamp(1.4rem, 5vw, 3rem);
    margin-bottom: 50px;
    color: #fff;
    text-shadow: 0 0 30px rgba(255, 162, 22, 0.4);
    max-width: 90vw;
  }
  #noBtn {
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.2s, color 0.2s, box-shadow 0.2s;
    transform-origin: center center;
  }
  #siBtn {
    min-width: 60px;
  }
  .buttons {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-size: 1.6rem;
    padding: 16px 50px;
    border: 2px solid #FFA216;
    background: transparent;
    color: #FFA216;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  button:hover {
    background: #FFA216;
    color: #000;
    box-shadow: 0 0 25px rgba(255, 162, 22, 0.6);
  }
  #siBtn {
    transition: left 0.12s ease, top 0.12s ease, background 0.2s, color 0.2s;
  }

  #flowerWrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #flowerCanvas {
    display: block;
    max-width: 92vw;
    max-height: 78vh;
    width: auto;
    height: auto;
  }

  #message {
    position: absolute;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 92%;
    max-width: 640px;
    pointer-events: none;
  }
  #message > * {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  #message.show > * {
    opacity: 1;
    transform: translateY(0);
  }
  #message.show > *:nth-child(1) { transition-delay: 0.1s; }
  #message.show > *:nth-child(2) { transition-delay: 0.7s; }
  #message.show > *:nth-child(3) { transition-delay: 1.3s; }
  #message.show > *:nth-child(4) { transition-delay: 1.9s; }
  #message h2 {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: #FFA216;
    margin-bottom: 8px;
    text-shadow: 0 0 25px rgba(255, 162, 22, 0.8);
  }
  #message p {
    font-size: clamp(0.95rem, 2.4vw, 1.25rem);
    color: #fff;
    margin-top: 6px;
  }
  #message .sign {
    margin-top: 14px;
    font-style: italic;
    color: #FFD27A;
  }

  .float {
    position: fixed;
    pointer-events: none;
    font-size: 22px;
    animation: floatUp linear forwards;
    z-index: 5;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="screen1" class="screen">
  <img id="catImg" src="gato.jpg" alt="" onerror="this.style.display='none'">
  <h1>¿Crees que me olvidé de tu cumpleaños?</h1>
  <div class="buttons">
    <button id="siBtn" type="button">Sí</button>
    <button id="noBtn" type="button">No</button>
  </div>
</div>

<div id="screen2" class="screen hidden">
  <div id="flowerWrap">
    <canvas id="flowerCanvas" width="800" height="800"></canvas>
  </div>
  <div id="message">
    <h2>Feliz Cumpleaños, Mejor Amiga</h2>
    <p>Te amo, amor de mi vida.</p>
    <p>Aquí están tus girasoles, dibujados con código solo para ti.</p>
    <p class="sign">Te amo, piroba</p>
  </div>
</div>

<script>
// ============== SI BUTTON ESCAPES + NO GROWS ==============
const siBtn = document.getElementById('siBtn');
const noBtn = document.getElementById('noBtn');
let noLocked = false;
function lockNo() {
  if (noLocked) return;
  const r = noBtn.getBoundingClientRect();
  noBtn.style.position = 'fixed';
  noBtn.style.left = r.left + 'px';
  noBtn.style.top = r.top + 'px';
  noBtn.style.margin = '0';
  noLocked = true;
}

const siVariants = [
  'Sí',
  '¿De verdad?',
  '¿En serio?',
  '¿De verdad de verdad?',
  '¿Segurísima?',
  '¿De verdad, viere que me olvidé?',
  '¿Cómo crees?',
  'Insiste pues',
  '¿En serio en serio?',
  '¿Otra vez?',
  '¿De verdad piensas eso?',
  '¿Estás segura segura?',
  '¿Tú confías tan poquito en mí?',
  '¿Apuestas?',
];
let siInteractCount = 0;
let noScale = 1;
let isOverSi = false;

function changeSiText() {
  siInteractCount++;
  siBtn.textContent = siVariants[siInteractCount % siVariants.length];
}
function growNo() {
  noScale = Math.min(2.6, noScale + 0.11);
  noBtn.style.transform = `scale(${noScale})`;
}
function teleportSi() {
  const pad = 20;
  const w = Math.max(50, window.innerWidth  - siBtn.offsetWidth  - pad);
  const h = Math.max(50, window.innerHeight - siBtn.offsetHeight - pad);
  siBtn.style.position = 'fixed';
  siBtn.style.left = (pad + Math.random() * (w - pad)) + 'px';
  siBtn.style.top  = (pad + Math.random() * (h - pad)) + 'px';
}
function onSiContact(e) {
  if (e) e.preventDefault?.();
  if (isOverSi) return;
  isOverSi = true;
  lockNo();
  changeSiText();
  growNo();
  teleportSi();
  setTimeout(() => { isOverSi = false; }, 80);
}
['pointerenter','focus','click','touchstart'].forEach(ev =>
  siBtn.addEventListener(ev, onSiContact, { passive: false })
);
siBtn.addEventListener('pointerleave', () => { isOverSi = false; });

// ============== NO -> FLOWER ==============
noBtn.addEventListener('click', () => {
  const s1 = document.getElementById('screen1');
  const s2 = document.getElementById('screen2');
  s1.classList.add('hidden');
  setTimeout(() => {
    s2.classList.remove('hidden');
    setTimeout(startFlower, 600);
  }, 1500);
});

// ============== SUNFLOWER (turtle port) ==============
const canvas = document.getElementById('flowerCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const deg = d => d * Math.PI / 180;

const t = { x: 0, y: -40, heading: 0 };
const segments = [];

function circle(r, extent, color) {
  const cx = t.x + r * Math.cos(deg(t.heading + 90));
  const cy = t.y + r * Math.sin(deg(t.heading + 90));
  const startAng = t.heading - 90;
  const endAng = startAng + extent;
  const seg = { cx, cy, r, startAng, endAng, color };
  segments.push(seg);
  t.x = cx + r * Math.cos(deg(endAng));
  t.y = cy + r * Math.sin(deg(endAng));
  t.heading += extent;
  return seg;
}
const rt = d => { t.heading -= d; };
const lt = d => { t.heading += d; };

// Build segments grouped petal-by-petal (16 petals, each ~37 arcs)
const petalSizes = [];
for (let i = 0; i < 16; i++) {
  const before = segments.length;
  for (let j = 0; j < 18; j++) {
    rt(90); circle(150 - j*6, 90, '#FFA216'); lt(90);
    circle(150 - j*6, 90, '#FFA216'); rt(180);
  }
  circle(40, 24, '#FFA216');
  petalSizes.push(segments.length - before);
}

const FLOWER_CX = W/2;
const FLOWER_CY = 280; // shift flower up so stem fits below
function toCanvas(x, y) {
  return { x: FLOWER_CX + x, y: FLOWER_CY - y };
}

function drawSegment(seg) {
  ctx.beginPath();
  ctx.strokeStyle = seg.color;
  ctx.lineWidth = 1.1;
  ctx.shadowColor = seg.color;
  ctx.shadowBlur = 6;
  const span = Math.abs(seg.endAng - seg.startAng);
  const steps = Math.max(10, Math.ceil(span / 2));
  for (let s = 0; s <= steps; s++) {
    const a = seg.startAng + (seg.endAng - seg.startAng) * (s / steps);
    const x = seg.cx + seg.r * Math.cos(deg(a));
    const y = seg.cy + seg.r * Math.sin(deg(a));
    const p = toCanvas(x, y);
    if (s === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
}

let petalIdx = 0;
let petalCursor = 0;
let segInPetal = 0;
function startFlower() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  petalIdx = 0;
  petalCursor = 0;
  segInPetal = 0;
  growStem();
}

// Stem grows from bottom up to flower base
function growStem() {
  const topY = FLOWER_CY + 140;
  const bottomY = H - 30;
  const totalLen = bottomY - topY;
  const dur = 700;
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 2);
    const len = totalLen * eased;
    // overwrite stem strip each frame
    ctx.fillStyle = '#000';
    ctx.fillRect(FLOWER_CX - 30, topY - 5, 60, totalLen + 15);

    ctx.beginPath();
    ctx.strokeStyle = '#3d7a1a';
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#2d5016';
    ctx.shadowBlur = 8;
    const endY = bottomY - len; // grow upward from bottom toward top? we want bottom->top? actually stem starts at flower base. let's grow downward.
    // start at top (flower base), curve down
    ctx.moveTo(FLOWER_CX, topY);
    const cp1x = FLOWER_CX + 14;
    const cp1y = topY + (len) * 0.5;
    const endActualY = topY + len;
    ctx.quadraticCurveTo(cp1x, cp1y, FLOWER_CX, endActualY);
    ctx.stroke();

    // small leaf when stem ~60%+
    if (t >= 0.6) {
      const leafT = Math.min(1, (t - 0.6) / 0.4);
      const leafSize = 28 * leafT;
      const leafX = FLOWER_CX + 14;
      const leafY = topY + len * 0.55;
      ctx.beginPath();
      ctx.fillStyle = '#4a8c20';
      ctx.shadowBlur = 4;
      ctx.ellipse(leafX + leafSize*0.6, leafY, leafSize, leafSize * 0.45, -0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    if (t < 1) requestAnimationFrame(step);
    else requestAnimationFrame(drawPetalStep);
  }
  requestAnimationFrame(step);
}

function drawPetalStep() {
  if (petalIdx >= petalSizes.length) {
    setTimeout(finishFlower, 150);
    return;
  }
  const petalLen = petalSizes[petalIdx];
  const perFrame = 4; // ~9 frames per petal ≈ 150ms; 16 petals × 150ms ≈ 2.4s
  for (let k = 0; k < perFrame && segInPetal < petalLen; k++) {
    drawSegment(segments[petalCursor + segInPetal]);
    segInPetal++;
  }
  if (segInPetal < petalLen) {
    requestAnimationFrame(drawPetalStep);
  } else {
    petalCursor += petalLen;
    petalIdx++;
    segInPetal = 0;
    setTimeout(() => requestAnimationFrame(drawPetalStep), 25);
  }
}
function finishFlower() {
  const c = toCanvas(0, 0);
  // Warm yellowish-brown base disk grows in
  const targetR = 52;
  const duration = 450;
  const start = performance.now();
  function growBase(now) {
    const tt = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - tt, 3);
    const r = targetR * eased;
    const grad = ctx.createRadialGradient(c.x, c.y, 4, c.x, c.y, Math.max(10, r + 8));
    grad.addColorStop(0, '#3a1f08');
    grad.addColorStop(0.6, '#6a3f12');
    grad.addColorStop(1, '#a87b3c');
    ctx.beginPath();
    ctx.shadowColor = '#FFA216';
    ctx.shadowBlur = 30;
    ctx.fillStyle = grad;
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.fill();
    if (tt < 1) requestAnimationFrame(growBase);
    else drawPhyllotaxis();
  }
  requestAnimationFrame(growBase);

  // Vogel phyllotaxis: golden-angle spiral, yellowish-brown seeds
  function drawPhyllotaxis() {
    const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // 137.5°
    const total = 260;
    const scale = 2.7;
    const browns = ['#5a3a14','#7a4f1a','#a06a28','#c98a3a','#8a5a20','#6a4218'];
    let i = 0;
    function step() {
      ctx.shadowBlur = 0;
      const perFrame = 10;
      for (let k = 0; k < perFrame && i < total; k++) {
        const r = scale * Math.sqrt(i);
        const theta = i * goldenAngle;
        const x = c.x + r * Math.cos(theta);
        const y = c.y + r * Math.sin(theta);
        const size = 1.4 + (i / total) * 1.6;
        ctx.beginPath();
        ctx.fillStyle = browns[i % browns.length];
        ctx.shadowColor = '#FFA216';
        ctx.shadowBlur = 2;
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
        i++;
      }
      if (i < total) {
        requestAnimationFrame(step);
      } else {
        setTimeout(() => {
          document.getElementById('message').classList.add('show');
        }, 250);
        setTimeout(rainEmoji, 1200);
      }
    }
    requestAnimationFrame(step);
  }
}

// ============== RAIN ==============
function rainEmoji() {
  const emojis = ['💛','🌻','✨','💖','🌟'];
  setInterval(() => {
    const el = document.createElement('div');
    el.className = 'float';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.bottom = '-30px';
    el.style.fontSize = (16 + Math.random() * 22) + 'px';
    const dur = 3.5 + Math.random() * 3;
    el.style.animationDuration = dur + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 200);
  }, 320);
}
</script>
</body>
</html>
